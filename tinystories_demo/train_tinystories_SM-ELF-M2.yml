# SM-ELF M2 (low-rank semantic manifold + cycle + IB) on TinyStories.
# Same as the M1 config but turns on the manifold bottleneck and the two
# regularizers. Use ONLY after the M1 C1 smoke test passes.

data_path: "tinystories_demo/data_50k/train"
eval_data_path: "tinystories_demo/data_50k/val"
max_length: 256
pad_token: eos
tokenizer_name: "t5-small"
encoder_model_name: "t5-small"
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"

latent_mean: 0.0
latent_std: 0.2

model: "ELF-B"
bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4

# --- SM-ELF M2: low-rank manifold code + cycle + IB ---
semantic_factorization: true
num_phi_tokens: 4
manifold_dim: 64          # k: semantic code c in R^64 (<< d=512)
cycle_loss_weight: 1.0    # lambda_cyc: re-probe(x_hat) must match the code
ib_beta: 0.001            # KL(q(c|s) || N(0,I)) bottleneck weight

denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8

self_cond_prob: 0.5

optimizer: "adamw"
global_batch_size: 80
blr: 0.001
weight_decay: 0.0
warmup_steps: 1000
ema_decay1: 0.9999
epochs: 60

log_freq: 50
save_freq: 2
eval_freq: 0.5
online_eval: false
eval_use_ema: false

sampling_configs_path: "src/configs/sampling_configs/uncond_sampling_configs.yml"
num_samples: 10
output_dir: "/mnt/faster3/lc2762/elf_tinystories_sm_m2_output"
use_wandb: false
seed: 42
