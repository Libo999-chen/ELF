# TinyStories ELF-B — v2, using the authors' proven hyperparameters (modeled on
# train_owt_ELF-B.yml). The first demo used Config defaults for latent_std / denoiser
# schedule / lr, which crippled quality. This fixes them.

data_path: "tinystories_demo/data_50k/train"
eval_data_path: "tinystories_demo/data_50k/val"
max_length: 256
pad_token: eos
tokenizer_name: "t5-small"
encoder_model_name: "t5-small"
encoder_checkpoint: "embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl"

# --- latent normalization (CRITICAL: was wrongly 1.0 before) ---
latent_mean: 0.0
latent_std: 0.2

# --- architecture ---
model: "ELF-B"
bottleneck_dim: 128
num_time_tokens: 4
num_self_cond_cfg_tokens: 4
num_model_mode_tokens: 4

# --- denoiser objective (authors' schedule) ---
denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
t_eps: 0.05
time_schedule: "logit_normal"

# --- decoder objective ---
decoder_prob: 0.2
decoder_noise_scale: 5.0
decoder_p_mean: 0.8
decoder_p_std: 0.8

# --- conditioning ---
self_cond_prob: 0.5

# --- optimization (muon needs jax>=0.4.27, unavailable on this driver -> adamw) ---
optimizer: "adamw"
global_batch_size: 80    # 16/GPU x 5 GPUs (0,1,2,3,4); must be divisible by num GPUs
blr: 0.001               # effective lr ~= blr * 80/256 = 3.1e-4
weight_decay: 0.0
warmup_steps: 1000
ema_decay1: 0.9999
epochs: 60               # ~390 steps/epoch * 60 ~= 23k steps; tuned to the ~2-3h budget

# --- logging / checkpoints ---
log_freq: 50
save_freq: 2        # checkpoint every 2 epochs (keep last 3)
eval_freq: 0.5      # <1 -> no in-loop generation (generate separately at the end)
online_eval: false
eval_use_ema: false # short-ish run: generate from raw params, not undertrained EMA

# --- sampling / output ---
sampling_configs_path: "src/configs/sampling_configs/uncond_sampling_configs.yml"
num_samples: 10
output_dir: "/mnt/faster3/lc2762/elf_tinystories_v2_output"
use_wandb: false
seed: 42
